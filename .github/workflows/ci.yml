name: GitHub Native Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect affected services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.discover.outputs.services }}
      go-services: ${{ steps.discover.outputs.go-services }}
      has-services: ${{ steps.discover.outputs.has-services }}
      has-go-services: ${{ steps.discover.outputs.has-go-services }}
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Discover changed services and languages
        id: discover
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/ci/discover-services.sh "$BASE_SHA" "$HEAD_SHA"

  service-quality:
    name: ${{ matrix.service.name }} (${{ matrix.service.language }})
    needs: detect-services
    if: needs.detect-services.outputs.has-services == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-services.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        if: matrix.service.language == 'go'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          # Security baseline: patched runtime used by the POC, while the
          # module's `go` directive continues to define language compatibility.
          go-version: 1.25.12
          cache: true
          cache-dependency-path: ${{ matrix.service.path }}/go.sum

      - name: Set up Node.js
        if: matrix.service.language == 'node'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          # Package-manager caching is intentionally configured inside each
          # service after its lockfile type (npm/pnpm/yarn) is known.
          package-manager-cache: false

      - name: Set up Java
        if: matrix.service.language == 'java'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Run language quality, tests, coverage, and build
        env:
          SERVICE_COVERAGE_THRESHOLD: '70'
        run: bash scripts/ci/run-service-checks.sh "${{ matrix.service.path }}" "${{ matrix.service.language }}"

      - name: Upload Go coverage
        if: always() && matrix.service.language == 'go'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/coverage.out
          if-no-files-found: warn
          retention-days: 7

  govulncheck:
    name: Go vulnerability scan
    needs: detect-services
    if: needs.detect-services.outputs.has-go-services == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-services.outputs.go-services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          # govulncheck must run with the patched scanner/runtime baseline.
          go-version: 1.25.12
          cache: true
          cache-dependency-path: ${{ matrix.service.path }}/go.sum

      - name: Install pinned govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan reachable Go vulnerabilities
        working-directory: ${{ matrix.service.path }}
        run: govulncheck ./...

  trivy:
    name: Repository security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Scan vulnerabilities, secrets, and misconfiguration
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          output: trivy-report.txt
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn
          retention-days: 7

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Block newly introduced high or critical dependency vulnerabilities
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  quality-gate:
    name: Quality Gate
    if: always()
    needs: [detect-services, service-quality, govulncheck, trivy, dependency-review]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required checks
        shell: bash
        run: |
          echo "service-quality=${{ needs.service-quality.result }}"
          echo "govulncheck=${{ needs.govulncheck.result }}"
          echo "trivy=${{ needs.trivy.result }}"
          echo "dependency-review=${{ needs.dependency-review.result }}"

          test "${{ needs.detect-services.result }}" = "success"

          if [ "${{ needs.detect-services.outputs.has-services }}" = "true" ]; then
            test "${{ needs.service-quality.result }}" = "success"
          else
            test "${{ needs.service-quality.result }}" = "skipped"
          fi

          if [ "${{ needs.detect-services.outputs.has-go-services }}" = "true" ]; then
            test "${{ needs.govulncheck.result }}" = "success"
          else
            test "${{ needs.govulncheck.result }}" = "skipped"
          fi

          test "${{ needs.trivy.result }}" = "success"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            test "${{ needs.dependency-review.result }}" = "success"
          else
            test "${{ needs.dependency-review.result }}" = "skipped"
          fi
